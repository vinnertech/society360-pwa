<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Society 360 - Offline</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
        }
        .offline-card {
            border-radius: 20px;
            border: none;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-6 col-lg-5">
                <div class="card offline-card p-5 text-center">
                    <i class="bi bi-wifi-off" style="font-size: 4rem; color: #6c757d;"></i>
                    <h3 class="mt-4">You're Offline</h3>
                    <p class="text-muted mb-4">
                        Don't worry! You can still access previously loaded data and submit new entries. 
                        They will sync automatically when you're back online.
                    </p>
                    
                    <div class="list-group mb-4">
                        <div class="list-group-item">
                            <i class="bi bi-check-circle-fill text-success"></i>
                            View cached visitor history
                        </div>
                        <div class="list-group-item">
                            <i class="bi bi-check-circle-fill text-success"></i>
                            Submit new visitor entries
                        </div>
                        <div class="list-group-item">
                            <i class="bi bi-check-circle-fill text-success"></i>
                            Access maintenance bills
                        </div>
                    </div>
                    
                    <button class="btn btn-primary" onclick="window.location.reload()">
                        <i class="bi bi-arrow-repeat"></i> Try Again
                    </button>
                    
                    <button class="btn btn-outline-secondary mt-2" onclick="window.history.back()">
                        <i class="bi bi-arrow-left"></i> Go Back
                    </button>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
