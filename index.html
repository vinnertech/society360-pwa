<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0d6efd">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <!-- PWA Manifest -->
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icons/icon-192x192.png">
    
    <!-- Bootstrap 5 & Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    
    <title>Society 360 - Smart Society Management</title>
    
    <style>
        :root {
            --primary-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        
        body {
            padding-bottom: 70px;
            background: #f8f9fc;
        }
        
        .dashboard-card {
            border-radius: 20px;
            border: none;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            transition: transform 0.2s;
        }
        
        .dashboard-card:hover {
            transform: translateY(-2px);
        }
        
        .login-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            background: var(--primary-gradient);
        }
        
        .navbar-brand {
            font-weight: 700;
            background: var(--primary-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .status-badge {
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 500;
        }
        
        .offline-indicator {
            position: fixed;
            top: 10px;
            right: 10px;
            z-index: 9999;
            display: none;
        }
        
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: white;
            box-shadow: 0 -5px 20px rgba(0,0,0,0.05);
            padding: 10px 0;
            z-index: 1000;
        }
        
        .nav-item-custom {
            color: #6c757d;
            text-decoration: none;
            font-size: 0.8rem;
            transition: color 0.2s;
        }
        
        .nav-item-custom.active {
            color: #667eea;
        }
        
        .nav-item-custom i {
            font-size: 1.5rem;
            display: block;
        }
        
        .skeleton-loader {
            background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%);
            background-size: 200% 100%;
            animation: loading 1.5s infinite;
        }
        
        @keyframes loading {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }
        
        .notification-toast {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 99999;
        }
    </style>
</head>
<body>
    <!-- Offline Indicator -->
    <div class="offline-indicator">
        <span class="badge bg-warning text-dark">
            <i class="bi bi-wifi-off"></i> Offline Mode
        </span>
    </div>

    <!-- Notification Container -->
    <div class="notification-toast"></div>

    <!-- Login Screen -->
    <div id="loginScreen" class="login-container">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-md-5 col-lg-4">
                    <div class="card dashboard-card p-4">
                        <div class="text-center mb-4">
                            <i class="bi bi-building" style="font-size: 3rem; color: #667eea;"></i>
                            <h3 class="mt-3 fw-bold">Society 360</h3>
                            <p class="text-muted">Smart Community Management</p>
                        </div>
                        
                        <form id="loginForm" onsubmit="return false;">
                            <div class="mb-3">
                                <label class="form-label">Username</label>
                                <div class="input-group">
                                    <span class="input-group-text"><i class="bi bi-person"></i></span>
                                    <input type="text" class="form-control" id="username" required>
                                </div>
                            </div>
                            
                            <div class="mb-3">
                                <label class="form-label">Password</label>
                                <div class="input-group">
                                    <span class="input-group-text"><i class="bi bi-lock"></i></span>
                                    <input type="password" class="form-control" id="password" required>
                                </div>
                            </div>
                            
                            <button class="btn btn-primary w-100 py-2" onclick="login()">
                                <i class="bi bi-box-arrow-in-right"></i> Login
                            </button>
                        </form>
                        
                        <div class="text-center mt-3">
                            <small class="text-muted">Demo: owner1 / pass123</small>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Main Dashboard Container -->
    <div id="dashboardContainer" style="display: none;">
        <!-- Top Navigation -->
        <nav class="navbar bg-white shadow-sm px-3">
            <div class="container-fluid">
                <span class="navbar-brand">
                    <i class="bi bi-building"></i> Society 360
                </span>
                <div class="d-flex align-items-center">
                    <span id="userBadge" class="badge bg-primary me-2"></span>
                    <button class="btn btn-outline-danger btn-sm" onclick="logout()">
                        <i class="bi bi-box-arrow-right"></i>
                    </button>
                </div>
            </div>
        </nav>

        <!-- Dynamic Content Area -->
        <div class="container mt-4">
            <div id="dashboardContent"></div>
        </div>

        <!-- Bottom Navigation -->
        <div class="bottom-nav">
            <div class="container">
                <div class="row text-center" id="bottomNav">
                    <!-- Dynamically populated based on role -->
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- Firebase (for Push Notifications) -->
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-messaging-compat.js"></script>
    
    <!-- Main Application Script -->
    <script src="app.js"></script>
    
    <!-- PWA Registration -->
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('service-worker.js')
                    .then(reg => console.log('Service Worker registered'))
                    .catch(err => console.log('Service Worker failed:', err));
            });
        }
    </script>
    <script type="module">
  // Import the functions you need from the SDKs you need
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
  // TODO: Add SDKs for Firebase products that you want to use
  // https://firebase.google.com/docs/web/setup#available-libraries

  // Your web app's Firebase configuration
  const firebaseConfig = {
    apiKey: "AIzaSyCQ_DMfAc2h30DJPCrHy5mdMsWnpIxgyaU",
    authDomain: "society360app-5ea51.firebaseapp.com",
    projectId: "society360app-5ea51",
    storageBucket: "society360app-5ea51.firebasestorage.app",
    messagingSenderId: "1072295184711",
    appId: "1:1072295184711:web:621c847c7f87e73297a462"
  };

  // Initialize Firebase
  const app = initializeApp(firebaseConfig);
  
  // Initialize Firebase for older SDK
  if (typeof firebase !== 'undefined') {
    firebase.initializeApp(firebaseConfig);
  }
</script>
</body>
</html>
