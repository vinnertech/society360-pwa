<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Society 360 - Visitor Action</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
        }
        .action-card {
            border-radius: 20px;
            border: none;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-6 col-lg-5">
                <div class="card action-card p-4">
                    <div id="loadingState" class="text-center py-5">
                        <div class="spinner-border text-primary mb-3" role="status">
                            <span class="visually-hidden">Loading...</span>
                        </div>
                        <h5>Processing your request...</h5>
                    </div>
                    
                    <div id="successState" style="display: none;">
                        <div class="text-center">
                            <i class="bi bi-check-circle-fill text-success" style="font-size: 4rem;"></i>
                            <h3 class="mt-3" id="actionMessage"></h3>
                            <p class="text-muted" id="actionDetails"></p>
                            <button class="btn btn-primary mt-3" onclick="window.close()">
                                <i class="bi bi-check"></i> Close Window
                            </button>
                        </div>
                    </div>
                    
                    <div id="errorState" style="display: none;">
                        <div class="text-center">
                            <i class="bi bi-exclamation-triangle-fill text-warning" style="font-size: 4rem;"></i>
                            <h3 class="mt-3">Unable to Process</h3>
                            <p class="text-muted" id="errorMessage"></p>
                            <button class="btn btn-outline-secondary mt-3" onclick="window.close()">
                                Close
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        // ✅ UPDATE THIS WITH YOUR ACTUAL APPS SCRIPT URL
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzCilOIf6E6JBmwddnPlIjLfK96-05JPo8zB3pacJ2tgq1D1wsO8gTyge1_0aqP4y-faw/exec';
        
        async function handleAction() {
            const urlParams = new URLSearchParams(window.location.search);
            const visitorId = urlParams.get('visitor');
            const action = urlParams.get('action');
            
            if (!visitorId || !action) {
                showError('Invalid request parameters');
                return;
            }
            
            try {
                const response = await fetch(
                    `${SCRIPT_URL}?action=updateVisitor&visitorId=${visitorId}&status=${action}`
                );
                
                const result = await response.json();
                
                if (result.success) {
                    const actionText = action === 'approve' ? 'Approved' : 'Rejected';
                    document.getElementById('actionMessage').textContent = `Visitor ${actionText}!`;
                    document.getElementById('actionDetails').textContent = 
                        `The visitor entry has been ${actionText.toLowerCase()}.`;
                    
                    showSuccess();
                } else {
                    showError(result.error || 'Failed to process request');
                }
            } catch (error) {
                console.error('Error:', error);
                showError('Network error. Please check your connection.');
            }
        }
        
        function showSuccess() {
            document.getElementById('loadingState').style.display = 'none';
            document.getElementById('successState').style.display = 'block';
        }
        
        function showError(message) {
            document.getElementById('loadingState').style.display = 'none';
            document.getElementById('errorState').style.display = 'block';
            document.getElementById('errorMessage').textContent = message;
        }
        
        window.addEventListener('load', handleAction);
    </script>
</body>
</html>
